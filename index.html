<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Savings Tracker</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#16262A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Savings Tracker">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink: #16262A;
    --ink-light: #1F3A3F;
    --paper: #F6F1E4;
    --paper-dim: #FBE2DE;
    --teal: #1F6F5C;
    --teal-dark: #14493D;
    --gold: #C9A227;
    --clay: #B24B32;
    --clay-dark: #7E351F;
    --text-dark: #2B2B28;
    --text-mute: #6B6558;
  }
  *{ box-sizing: border-box; }
  body{
    margin:0;
    background: var(--paper-dim);
    font-family: 'Inter', sans-serif;
    color: var(--text-dark);
    min-height: 100vh;
  }
  .wrap{
    max-width: 720px;
    margin: 0 auto;
    padding: 0 0 4rem;
  }
  .vault{
    background: var(--ink);
    padding: 3rem 1.5rem 2.5rem;
    text-align: center;
    position: relative;
    border-bottom: 4px solid var(--gold);
  }
  .vault-label{
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #8FA69E;
    margin: 0 0 10px;
  }
  .vault-total{
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: clamp(40px, 9vw, 64px);
    color: var(--paper);
    margin: 0;
    letter-spacing: -0.01em;
    font-variant-numeric: tabular-nums;
  }
  .vault-sub{
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    color: #6C8B82;
    margin: 12px 0 0;
  }
  .stitch{
    position: absolute;
    left: 0; right: 0; bottom: -4px;
    height: 1px;
    background-image: repeating-linear-gradient(90deg, var(--gold) 0 8px, transparent 8px 16px);
    opacity: 0.6;
  }
  .loan-vault{ border-bottom-color: var(--clay); }
  .loan-vault .stitch{
    background-image: repeating-linear-gradient(90deg, var(--clay) 0 8px, transparent 8px 16px);
  }
  .milestones{
    display: flex;
    gap: 6px;
    justify-content: center;
    margin-top: 14px;
  }
  .milestone-dot{
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: rgba(255,255,255,0.22);
  }
  .milestone-dot.achieved{
    background: var(--gold);
  }
  .milestone-label{
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    color: #B8B2A3;
    margin: 8px 0 0;
  }
  .card.milestone-gold{
    box-shadow: 0 0 0 2px var(--gold), 0 0 14px rgba(201,162,39,0.35);
  }
  .loan-finished-note{
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 600;
    color: var(--card-accent, #1F5C29);
    background: rgba(255,255,255,0.5);
    border-radius: 4px;
    padding: 8px 10px;
    margin: 0 0 12px;
    line-height: 1.4;
  }
  .goal-progress-text{
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    color: var(--text-mute);
    margin: 0 0 10px;
  }
  .goal-reached-note{
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--card-accent, #1F5C29);
    background: rgba(255,255,255,0.5);
    border-radius: 4px;
    padding: 8px 10px;
    margin: 0 0 12px;
    line-height: 1.4;
  }
  .calc-display{
    background: var(--ink);
    color: var(--paper);
    font-family: 'Inter', sans-serif;
    font-size: 28px;
    font-weight: 700;
    text-align: right;
    padding: 16px 14px;
    border-radius: 6px;
    margin-bottom: 12px;
    overflow-x: auto;
    white-space: nowrap;
    font-variant-numeric: tabular-nums;
  }
  .calc-grid{
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }
  .calc-btn{
    padding: 14px 0;
    font-family: 'Inter', sans-serif;
    font-size: 16px;
    font-weight: 600;
    border-radius: 6px;
    border: 1px solid var(--text-mute);
    background: transparent;
    color: var(--text-dark);
    cursor: pointer;
  }
  .calc-btn:hover{ background: rgba(0,0,0,0.05); }
  .calc-btn.op{
    border-color: var(--teal);
    color: var(--teal-dark);
  }
  .calc-btn.op:hover{ background: rgba(31,111,92,0.1); }
  .calc-btn.clear{
    border-color: var(--clay);
    color: var(--clay-dark);
  }
  .calc-btn.clear:hover{ background: rgba(178,75,50,0.08); }
  .calc-btn.equals{
    background: var(--teal);
    border-color: var(--teal);
    color: var(--paper);
  }
  .calc-btn.equals:hover{ background: var(--teal-dark); }
  .global-toggle-bar{
    display: flex;
    justify-content: center;
    gap: 10px;
    padding: 14px 1.5rem 0;
    flex-wrap: wrap;
  }
  .hide-toggle-btn{
    display: flex;
    align-items: center;
    gap: 6px;
    background: transparent;
    border: 1px solid var(--text-mute);
    border-radius: 20px;
    padding: 8px 16px;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-mute);
    cursor: pointer;
  }
  .hide-toggle-btn:hover{ border-color: var(--teal); color: var(--teal-dark); }
  .hide-toggle-btn.active{
    border-color: var(--gold);
    color: var(--text-dark);
    background: rgba(201,162,39,0.1);
  }
  .hide-toggle-btn svg{ display: block; }
  .eye-btn{
    background: none;
    border: none;
    padding: 2px 4px;
    color: var(--text-mute);
    cursor: pointer;
    display: flex;
    align-items: center;
    flex-shrink: 0;
  }
  .eye-btn:hover{ color: var(--card-accent, var(--teal-dark)); }
  .eye-btn svg{ display: block; }
  .ledger{
    padding: 1.75rem 1.5rem 0;
  }
  .ledger-heading{
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-mute);
    margin: 0 0 1rem;
  }
  .grid{
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 14px;
  }
  .card{
    background: var(--paper);
    border-radius: 4px;
    border-left: 3px dashed var(--teal);
    padding: 1.1rem 1.25rem;
    position: relative;
  }
  .card .acct-name{ color: var(--card-accent, var(--teal-dark)); }
  .card .ctrl-btn{ border-color: var(--card-accent, var(--teal)); color: var(--card-accent, var(--teal-dark)); }
  .card .ctrl-btn.minus{ border-color: var(--card-accent, var(--clay)); color: var(--card-accent, var(--clay-dark)); }
  .card .ctrl-btn:hover{ background: var(--card-hover, rgba(31,111,92,0.1)); }
  .card-top{
    display:flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .logo-wrap{
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: #FFFFFF;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    overflow: hidden;
    border: 1px solid rgba(0,0,0,0.06);
  }
  .bank-logo{
    width: 100%;
    height: 100%;
    object-fit: contain;
    padding: 4px;
  }
  .bank-fallback{
    width: 100%;
    height: 100%;
    align-items: center;
    justify-content: center;
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 500;
    color: var(--card-accent, var(--teal-dark));
  }
  .name-field{
    flex: 1;
    min-width: 0;
  }
  .acct-name{
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 17px;
    color: var(--teal-dark);
    border: none;
    background: transparent;
    padding: 2px 0;
    width: 100%;
    border-bottom: 1px solid transparent;
    cursor: text;
  }
  .acct-name:hover{ border-bottom: 1px solid var(--teal); }
  .acct-name:focus{
    outline: none;
    border-bottom: 1px solid var(--gold);
  }
  .acct-number{
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 12px;
    color: var(--text-mute);
    border: none;
    background: transparent;
    padding: 1px 0;
    width: 100%;
    border-bottom: 1px solid transparent;
    cursor: text;
    letter-spacing: 0.02em;
  }
  .acct-number:hover{ border-bottom: 1px solid var(--text-mute); }
  .acct-number:focus{
    outline: none;
    border-bottom: 1px solid var(--gold);
  }
  .acct-number::placeholder{ color: var(--text-mute); opacity: 0.6; }
  .del-btn{
    background: none;
    border: none;
    color: var(--text-mute);
    font-size: 16px;
    cursor: pointer;
    line-height: 1;
    padding: 2px 4px;
    flex-shrink: 0;
  }
  .del-btn:hover{ color: var(--clay); }
  .acct-balance{
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 26px;
    margin: 10px 0 14px;
    color: var(--text-dark);
    font-variant-numeric: tabular-nums;
  }
  .controls{
    display: flex;
    gap: 8px;
  }
  .ctrl-btn{
    flex: 1;
    border: 1px solid var(--teal);
    background: transparent;
    color: var(--teal-dark);
    font-family: 'Inter', sans-serif;
    font-size: 16px;
    font-weight: 500;
    border-radius: 3px;
    padding: 6px 0;
    cursor: pointer;
    transition: background 0.12s ease;
  }
  .ctrl-btn:hover{ background: rgba(31,111,92,0.1); }
  .ctrl-btn.minus{
    border-color: var(--clay);
    color: var(--clay-dark);
  }
  .ctrl-btn.minus:hover{ background: rgba(178,75,50,0.08); }
  .editor{
    display: none;
    gap: 6px;
    margin-top: 4px;
  }
  .editor input{
    flex: 1;
    min-width: 0;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    padding: 6px 8px;
    border: 1px solid var(--text-mute);
    border-radius: 3px;
    background: white;
    color: var(--text-dark);
  }
  .editor input:focus{ outline: none; border-color: var(--gold); }
  .editor button{
    width: 34px;
    flex-shrink: 0;
    border: 1px solid var(--text-mute);
    background: var(--paper);
    border-radius: 3px;
    cursor: pointer;
    font-size: 14px;
  }
  .history-link{
    display: block;
    margin-top: 10px;
    background: none;
    border: none;
    padding: 0;
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 500;
    color: var(--card-accent, var(--teal-dark));
    text-decoration: underline;
    cursor: pointer;
    text-align: left;
  }
  .modal-overlay{
    position: fixed;
    inset: 0;
    background: rgba(22,38,42,0.55);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    z-index: 100;
  }
  .modal-overlay.open{ display: flex; }
  .modal-box{
    background: var(--paper);
    border-radius: 8px;
    width: 100%;
    max-width: 380px;
    max-height: 80vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .modal-head{
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 1.25rem;
    border-bottom: 1px solid rgba(0,0,0,0.08);
    flex-shrink: 0;
  }
  .modal-head h3{
    font-family: 'Inter', sans-serif;
    font-size: 16px;
    font-weight: 700;
    margin: 0;
    color: var(--text-dark);
  }
  .modal-close{
    background: none;
    border: none;
    font-size: 20px;
    color: var(--text-mute);
    cursor: pointer;
    line-height: 1;
    padding: 2px 6px;
  }
  .modal-close:hover{ color: var(--clay); }
  .modal-body{
    padding: 0.5rem 1.25rem 1.25rem;
    overflow-y: auto;
  }
  .history-row{
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid rgba(0,0,0,0.06);
  }
  .history-row:last-child{ border-bottom: none; }
  .history-date{
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    color: var(--text-mute);
  }
  .history-amounts{
    text-align: right;
  }
  .history-delta{
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }
  .history-delta.pos{ color: var(--teal-dark); }
  .history-delta.neg{ color: var(--clay-dark); }
  .history-balance{
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    color: var(--text-mute);
    font-variant-numeric: tabular-nums;
  }
  .history-empty{
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    color: var(--text-mute);
    padding: 1.5rem 0;
    text-align: center;
  }
  .loan-name{
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 17px;
    color: var(--card-accent, var(--teal-dark));
    margin: 0;
    padding-right: 20px;
    word-break: break-word;
  }
  .loan-meta{
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    color: var(--text-mute);
    margin: 6px 0 10px;
  }
  .loan-countdown{
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 15px;
    margin: 0 0 12px;
    font-variant-numeric: tabular-nums;
  }
  .pay-btn{
    width: 100%;
    border: 1px solid var(--teal);
    background: transparent;
    color: var(--teal-dark);
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 14px;
    padding: 8px 0;
    border-radius: 3px;
    cursor: pointer;
    margin-bottom: 8px;
  }
  .pay-btn:hover{ background: rgba(31,111,92,0.1); }
  .pay-btn:disabled{
    opacity: 0.55;
    cursor: not-allowed;
    border-color: var(--text-mute);
    color: var(--text-mute);
    background: transparent;
  }
  .loan-form-box{
    background: var(--paper);
    border: 1px dashed var(--text-mute);
    border-radius: 8px;
    padding: 1rem 1.25rem;
    display: none;
    flex-direction: column;
    gap: 8px;
    margin-top: 14px;
  }
  .loan-form-box.open{ display: flex; }
  .loan-form-box input{
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    padding: 8px 10px;
    border: 1px solid var(--text-mute);
    border-radius: 4px;
    background: white;
    color: var(--text-dark);
    width: 100%;
  }
  .loan-form-box input:focus{ outline: none; border-color: var(--gold); }
  .loan-form-actions{
    display: flex;
    gap: 8px;
    margin-top: 4px;
  }
  .loan-form-actions button{
    flex: 1;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 9px;
    border-radius: 4px;
    cursor: pointer;
  }
  #loan-form-save{
    border: 1px solid var(--teal);
    background: var(--teal);
    color: var(--paper);
  }
  #loan-form-cancel{
    border: 1px solid var(--text-mute);
    background: transparent;
    color: var(--text-mute);
  }
  .history-filters{
    display: flex;
    gap: 6px;
    padding: 0.75rem 1.25rem 0;
    flex-wrap: wrap;
  }
  .filter-btn{
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 500;
    padding: 5px 12px;
    border-radius: 999px;
    border: 1px solid var(--text-mute);
    background: transparent;
    color: var(--text-mute);
    cursor: pointer;
  }
  .filter-btn.active{
    border-color: var(--teal);
    background: var(--teal);
    color: var(--paper);
  }
  .add-account{
    width: 100%;
    margin-top: 14px;
    padding: 12px;
    border: 1px dashed var(--text-mute);
    background: transparent;
    border-radius: 4px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    color: var(--text-mute);
    cursor: pointer;
  }
  .add-account:hover{ border-color: var(--teal); color: var(--teal-dark); }
  .backup-row{
    display: flex;
    gap: 8px;
    margin-top: 10px;
  }
  .backup-btn{
    flex: 1;
    text-align: center;
    padding: 14px;
    border: 2px solid var(--teal);
    border-radius: 6px;
    background: transparent;
    font-family: 'Inter', sans-serif;
    font-size: 16px;
    font-weight: 600;
    color: var(--teal-dark);
    cursor: pointer;
  }
  .backup-btn:hover{ background: rgba(31,111,92,0.1); }
  .stamp{
    text-align: center;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-dark);
    margin-top: 0.75rem;
  }
</style>
</head>
<body>

<div class="wrap">
  <div class="global-toggle-bar">
    <button class="hide-toggle-btn" id="hide-savings-total-btn">
      <span id="hide-savings-total-icon"></span>
      <span id="hide-savings-total-text">Hide Total Savings</span>
    </button>
    <button class="hide-toggle-btn" id="hide-loan-total-btn">
      <span id="hide-loan-total-icon"></span>
      <span id="hide-loan-total-text">Hide Total Loan</span>
    </button>
  </div>
  <div class="vault">
    <p class="vault-label">Total Savings</p>
    <p class="vault-total" id="total">₱0.00</p>
    <p class="vault-sub" id="acct-count">0 accounts</p>
    <div class="milestones" id="savings-milestones"></div>
    <p class="milestone-label" id="savings-milestone-label"></p>
    <div class="stitch"></div>
  </div>

  <div class="ledger">
    <p class="ledger-heading">Your Accounts</p>
    <div class="grid" id="grid"></div>
    <button class="add-account" id="add-account-btn">+ Add Account</button>
  </div>

  <div class="ledger">
    <div class="vault loan-vault">
      <p class="vault-label">Total Remaining Loans</p>
      <p class="vault-total" id="loan-total">₱0.00</p>
      <p class="vault-sub" id="loan-count">0 loans</p>
      <div class="milestones" id="loan-milestones"></div>
      <p class="milestone-label" id="loan-milestone-label"></p>
      <div class="stitch"></div>
    </div>
    <p class="ledger-heading">Your Loans</p>
    <div class="grid" id="loan-grid"></div>
    <button class="add-account" id="add-loan-btn">+ Add Loan</button>
    <div class="loan-form-box" id="loan-form">
      <input type="text" id="loan-name-input" placeholder="Loan name (e.g. Motorcycle loan)">
      <input type="number" id="loan-amount-input" placeholder="Monthly installment amount" step="0.01" min="0">
      <input type="date" id="loan-duedate-input" aria-label="next due date">
      <input type="number" id="loan-installments-input" placeholder="Number of installments" min="1" step="1">
      <div class="loan-form-actions">
        <button id="loan-form-save">Add Loan</button>
        <button id="loan-form-cancel">Cancel</button>
      </div>
    </div>
  </div>

  <div class="ledger">
    <p class="ledger-heading" style="font-size:14px;">Backup &amp; export</p>
    <div class="backup-row">
      <button class="backup-btn" id="backup-btn">Export / Back Up Now</button>
      <label class="backup-btn" for="restore-input">Import Backup</label>
      <input type="file" id="restore-input" accept="application/json" style="display:none;">
    </div>
    <p class="stamp" id="last-updated"></p>
    <p class="stamp" id="backup-status"></p>
  </div>
</div>

<div class="modal-overlay" id="history-modal">
  <div class="modal-box">
    <div class="modal-head">
      <h3 id="history-modal-title">Account history</h3>
      <button class="modal-close" id="history-modal-close" aria-label="close">&times;</button>
    </div>
    <div class="history-filters" id="history-filters">
      <button class="filter-btn" data-days="7">7 Days</button>
      <button class="filter-btn" data-days="14">14 Days</button>
      <button class="filter-btn" data-days="30">30 Days</button>
      <button class="filter-btn" data-days="all">All</button>
    </div>
    <div class="modal-body" id="history-modal-body"></div>
  </div>
</div>

<div class="modal-overlay" id="goal-modal">
  <div class="modal-box">
    <div class="modal-head">
      <h3>Edit Goal</h3>
      <button class="modal-close" id="goal-modal-close" aria-label="close">&times;</button>
    </div>
    <div class="modal-body">
      <div class="loan-form-box open" style="margin-top:0;border:none;padding:0;">
        <input type="number" id="goal-amount-input" placeholder="Goal amount (\u20B1)" min="0" step="100">
        <input type="date" id="goal-date-input" aria-label="target date to reach this goal">
        <div class="loan-form-actions">
          <button id="goal-modal-save">Save Goal</button>
          <button id="goal-modal-cancel">Cancel</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="calculator-modal">
  <div class="modal-box" style="max-width: 300px;">
    <div class="modal-head">
      <h3>Calculator</h3>
      <button class="modal-close" id="calculator-modal-close" aria-label="close">&times;</button>
    </div>
    <div class="modal-body">
      <div class="calc-display" id="calc-display">0</div>
      <div class="calc-grid">
        <button class="calc-btn clear" data-action="clear">C</button>
        <button class="calc-btn clear" data-action="backspace">&larr;</button>
        <button class="calc-btn op" data-op="%">%</button>
        <button class="calc-btn op" data-op="/">&divide;</button>

        <button class="calc-btn" data-digit="7">7</button>
        <button class="calc-btn" data-digit="8">8</button>
        <button class="calc-btn" data-digit="9">9</button>
        <button class="calc-btn op" data-op="*">&times;</button>

        <button class="calc-btn" data-digit="4">4</button>
        <button class="calc-btn" data-digit="5">5</button>
        <button class="calc-btn" data-digit="6">6</button>
        <button class="calc-btn op" data-op="-">&minus;</button>

        <button class="calc-btn" data-digit="1">1</button>
        <button class="calc-btn" data-digit="2">2</button>
        <button class="calc-btn" data-digit="3">3</button>
        <button class="calc-btn op" data-op="+">+</button>

        <button class="calc-btn" data-digit="0" style="grid-column: span 2;">0</button>
        <button class="calc-btn" data-action="decimal">.</button>
        <button class="calc-btn equals" data-action="equals">=</button>
      </div>
    </div>
  </div>
</div>

<script>
(function(){
  const EYE_OPEN_SVG = '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>';
  const EYE_OFF_SVG = '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.94 10.94 0 0 1 12 19c-7 0-11-7-11-7a18.5 18.5 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 7 11 7a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';
  const MASK_STRING = '\u20B1 \u25CF\u25CF\u25CF\u25CF\u25CF\u25CF';
  const HIDE_SAVINGS_TOTAL_KEY = 'ph_savings_tracker_hide_savings_total';
  const HIDE_LOAN_TOTAL_KEY = 'ph_savings_tracker_hide_loan_total';
  const hideSavingsTotalBtn = document.getElementById('hide-savings-total-btn');
  const hideSavingsTotalIconEl = document.getElementById('hide-savings-total-icon');
  const hideSavingsTotalTextEl = document.getElementById('hide-savings-total-text');
  const hideLoanTotalBtn = document.getElementById('hide-loan-total-btn');
  const hideLoanTotalIconEl = document.getElementById('hide-loan-total-icon');
  const hideLoanTotalTextEl = document.getElementById('hide-loan-total-text');
  let hideSavingsTotal = false;
  let hideLoanTotal = false;

  const grid = document.getElementById('grid');
  const totalEl = document.getElementById('total');
  const countEl = document.getElementById('acct-count');
  const savingsMilestonesEl = document.getElementById('savings-milestones');
  const savingsMilestoneLabelEl = document.getElementById('savings-milestone-label');
  const addBtn = document.getElementById('add-account-btn');
  const lastUpdatedEl = document.getElementById('last-updated');
  const historyModal = document.getElementById('history-modal');
  const historyModalTitle = document.getElementById('history-modal-title');
  const historyModalBody = document.getElementById('history-modal-body');
  const historyModalClose = document.getElementById('history-modal-close');
  const historyFilters = document.getElementById('history-filters');
  const goalModal = document.getElementById('goal-modal');
  const goalModalClose = document.getElementById('goal-modal-close');
  const goalAmountInput = document.getElementById('goal-amount-input');
  const goalDateInput = document.getElementById('goal-date-input');
  const goalModalSave = document.getElementById('goal-modal-save');
  const goalModalCancel = document.getElementById('goal-modal-cancel');
  const calculatorModal = document.getElementById('calculator-modal');
  const calculatorModalClose = document.getElementById('calculator-modal-close');
  const calcDisplayEl = document.getElementById('calc-display');
  let currentGoalEditId = null;
  const backupBtn = document.getElementById('backup-btn');
  const restoreInput = document.getElementById('restore-input');
  const backupStatusEl = document.getElementById('backup-status');
  const loanGrid = document.getElementById('loan-grid');
  const loanTotalEl = document.getElementById('loan-total');
  const loanCountEl = document.getElementById('loan-count');
  const loanMilestonesEl = document.getElementById('loan-milestones');
  const loanMilestoneLabelEl = document.getElementById('loan-milestone-label');
  const addLoanBtn = document.getElementById('add-loan-btn');
  const loanForm = document.getElementById('loan-form');
  const loanNameInput = document.getElementById('loan-name-input');
  const loanAmountInput = document.getElementById('loan-amount-input');
  const loanDueDateInput = document.getElementById('loan-duedate-input');
  const loanInstallmentsInput = document.getElementById('loan-installments-input');
  const loanFormSave = document.getElementById('loan-form-save');
  const loanFormCancel = document.getElementById('loan-form-cancel');
  const LOANS_STORAGE_KEY = 'ph_savings_tracker_loans';
  let loans = [];
  const BACKUP_KEY = 'ph_savings_tracker_last_backup';
  const SEVEN_DAYS_MS = 7 * 24 * 60 * 60 * 1000;
  const STORAGE_KEY = 'ph_savings_tracker_accounts';

  const BANK_DOMAINS = {
    'bdo': 'bdo.com.ph',
    'bpi': 'bpi.com.ph',
    'metrobank': 'metrobank.com.ph',
    'unionbank': 'unionbank.com',
    'union bank': 'unionbank.com',
    'security bank': 'securitybank.com',
    'landbank': 'landbank.com',
    'pnb': 'pnb.com.ph',
    'philippine national bank': 'pnb.com.ph',
    'rcbc': 'rcbc.com',
    'eastwest': 'eastwestbanker.com',
    'east west': 'eastwestbanker.com',
    'chinabank': 'chinabank.ph',
    'china bank': 'chinabank.ph',
    'gcash': 'gcash.com',
    'maya': 'maya.ph',
    'paymaya': 'maya.ph',
    'ing': 'ing.com.ph',
    'cimb': 'cimbbank.com.ph',
    'robinsons bank': 'robinsonsbank.com.ph',
    'psbank': 'psbank.com.ph',
    'sterling bank': 'sterlingbankasia.com',
    'dbp': 'dbp.ph',
    'development bank': 'dbp.ph',
    'ucpb': 'ucpb.com',
    'tonik': 'tonikbank.com',
    'seabank': 'seabank.ph',
    'komo': 'komo.ph',
    'gotyme': 'gotyme.com.ph',
    'go tyme': 'gotyme.com.ph',
    'maybank': 'maybank.com.ph',
    'uno digital': 'unodigitalbank.ph',
    'unodigital': 'unodigitalbank.ph'
  };

  function bankDomain(name){
    const n = name.toLowerCase();
    for(const key in BANK_DOMAINS){
      if(n.includes(key)) return BANK_DOMAINS[key];
    }
    return null;
  }

  function initials(name){
    const words = name.trim().split(/\s+/).filter(Boolean);
    if(!words.length) return '?';
    return words.slice(0,2).map(w=>w[0]).join('').toUpperCase();
  }

  function logoHtml(name){
    const domain = bankDomain(name);
    const fallback = `<div class="bank-fallback" style="display:${domain ? 'none' : 'flex'};">${initials(name)}</div>`;
    if(!domain) return fallback;
    return `<img class="bank-logo" src="https://www.google.com/s2/favicons?sz=128&domain=${domain}" alt="" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">${fallback}`;
  }

  let accounts = [];
  let openEditorId = null;
  let currentHistoryId = null;
  let currentHistoryDays = 'all';
  let currentHistoryType = 'account';

  const PALETTE = [
    { bg:'#E4F0EC', border:'#1F6F5C', text:'#14493D', hover:'rgba(31,111,92,0.12)' },
    { bg:'#F5E6DE', border:'#B24B32', text:'#7E351F', hover:'rgba(178,75,50,0.12)' },
    { bg:'#F7EFD9', border:'#C9A227', text:'#8A6C13', hover:'rgba(201,162,39,0.14)' },
    { bg:'#EFE3EC', border:'#7A4869', text:'#55324A', hover:'rgba(122,72,105,0.12)' },
    { bg:'#E2E8F0', border:'#3D5A80', text:'#253B54', hover:'rgba(61,90,128,0.12)' },
    { bg:'#E7EEDD', border:'#5B7A3D', text:'#3E5629', hover:'rgba(91,122,61,0.12)' }
  ];

  function themeFor(index){
    return PALETTE[index % PALETTE.length];
  }

  function fmt(n){
    return '₱' + Number(n).toLocaleString('en-PH', {minimumFractionDigits:2, maximumFractionDigits:2});
  }

  function doBackup(){
    try{
      const payload = { accounts, loans };
      const blob = new Blob([JSON.stringify(payload, null, 2)], {type:'application/json'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      const stamp = new Date().toISOString().slice(0,10);
      a.href = url;
      a.download = `savings-backup-${stamp}.json`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(()=>URL.revokeObjectURL(url), 1000);
      localStorage.setItem(BACKUP_KEY, String(Date.now()));
      updateBackupStatus();
    }catch(e){
      console.error('backup failed', e);
    }
  }

  function maybeAutoBackup(){
    let last = null;
    try{ last = Number(localStorage.getItem(BACKUP_KEY)) || null; }catch(e){}
    if(!accounts.length && !loans.length) return;
    if(!last || (Date.now() - last) >= SEVEN_DAYS_MS){
      doBackup();
    } else {
      updateBackupStatus();
    }
  }

  function updateBackupStatus(){
    let last = null;
    try{ last = Number(localStorage.getItem(BACKUP_KEY)) || null; }catch(e){}
    if(!last){
      backupStatusEl.textContent = 'no backup yet';
      return;
    }
    const lastDate = new Date(last);
    const dueDate = new Date(last + SEVEN_DAYS_MS);
    backupStatusEl.textContent = `last backup ${lastDate.toLocaleDateString('en-PH', {dateStyle:'medium'})} · next due ${dueDate.toLocaleDateString('en-PH', {dateStyle:'medium'})}`;
  }

  backupBtn.addEventListener('click', doBackup);

  restoreInput.addEventListener('change', (e)=>{
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = ()=>{
      try{
        const parsed = JSON.parse(reader.result);
        if(Array.isArray(parsed)){
          parsed.forEach(a=>{
            if(!Array.isArray(a.history)) a.history = [];
            if(typeof a.accountNumber !== 'string') a.accountNumber = '';
            if(typeof a.hidden !== 'boolean') a.hidden = false;
              if(typeof a.goal !== 'number') a.goal = 0;
              if(typeof a.goalTargetDate !== 'string') a.goalTargetDate = '';
          });
          accounts = parsed;
        } else if(parsed && typeof parsed === 'object'){
          if(Array.isArray(parsed.accounts)){
            parsed.accounts.forEach(a=>{
              if(!Array.isArray(a.history)) a.history = [];
              if(typeof a.accountNumber !== 'string') a.accountNumber = '';
              if(typeof a.hidden !== 'boolean') a.hidden = false;
              if(typeof a.goal !== 'number') a.goal = 0;
              if(typeof a.goalTargetDate !== 'string') a.goalTargetDate = '';
            });
            accounts = parsed.accounts;
          }
          if(Array.isArray(parsed.loans)){
            parsed.loans.forEach(l=>{
              if(!Array.isArray(l.history)) l.history = [];
              if(typeof l.hidden !== 'boolean') l.hidden = false;
              const isDone = l.installmentsPaid >= l.installmentsTotal;
              if(isDone && !l.finishedAt) l.finishedAt = Date.now();
            });
            loans = parsed.loans;
          }
        } else {
          throw new Error('invalid file');
        }
        save();
        saveLoans();
        render();
        renderLoans();
      }catch(err){
        alert('Could not read that backup file.');
      }
      restoreInput.value = '';
    };
    reader.readAsText(file);
  });

  function load(){
    let stored = null;
    try{ stored = localStorage.getItem(STORAGE_KEY); }catch(e){}
    if(stored){
      try{ accounts = JSON.parse(stored); }catch(e){ accounts = []; }
    }
    accounts.forEach(a=>{
      if(!Array.isArray(a.history)) a.history = [];
      if(typeof a.accountNumber !== 'string') a.accountNumber = '';
      if(typeof a.hidden !== 'boolean') a.hidden = false;
              if(typeof a.goal !== 'number') a.goal = 0;
              if(typeof a.goalTargetDate !== 'string') a.goalTargetDate = '';
    });
    if(!accounts || !accounts.length){
      accounts = [
        {id:'a1', name:'Checking', balance:0, history:[], accountNumber:'', hidden:false, goal:0, goalTargetDate:''},
        {id:'a2', name:'Savings', balance:0, history:[], accountNumber:'', hidden:false, goal:0, goalTargetDate:''}
      ];
      save();
    }
    render();
    maybeAutoBackup();
  }

  function save(){
    try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(accounts)); }catch(e){}
    stampUpdated();
  }

  function loadLoans(){
    let stored = null;
    try{ stored = localStorage.getItem(LOANS_STORAGE_KEY); }catch(e){}
    if(stored){
      try{ loans = JSON.parse(stored); }catch(e){ loans = []; }
    }
    loans.forEach(l=>{
      if(!Array.isArray(l.history)) l.history = [];
      if(typeof l.hidden !== 'boolean') l.hidden = false;
      const isDone = l.installmentsPaid >= l.installmentsTotal;
      if(isDone && !l.finishedAt) l.finishedAt = Date.now();
    });
    renderLoans();
  }

  function saveLoans(){
    try{ localStorage.setItem(LOANS_STORAGE_KEY, JSON.stringify(loans)); }catch(e){}
  }

  function formatCountdown(dueDateStr){
    const due = new Date(dueDateStr + 'T00:00:00').getTime();
    const diff = due - Date.now();
    if(diff <= 0){
      const overdueDays = Math.floor(-diff / 86400000);
      return overdueDays === 0 ? 'due today' : `overdue by ${overdueDays} day${overdueDays===1?'':'s'}`;
    }
    const days = Math.floor(diff / 86400000);
    const hours = Math.floor((diff % 86400000) / 3600000);
    const minutes = Math.floor((diff % 3600000) / 60000);
    const seconds = Math.floor((diff % 60000) / 1000);
    return `${days}d ${hours}h ${minutes}m ${seconds}s`;
  }

  function updateCountdowns(){
    document.querySelectorAll('.loan-countdown').forEach(el=>{
      const due = el.getAttribute('data-due');
      if(!due) return;
      el.textContent = formatCountdown(due);
      const overdue = new Date(due + 'T00:00:00').getTime() <= Date.now();
      el.style.color = overdue ? 'var(--clay-dark)' : 'var(--card-accent, var(--teal-dark))';
    });
  }

  setInterval(updateCountdowns, 1000);

  function renderLoanMilestones(){
    const totalOriginal = loans.reduce((s,l)=> s + (l.amount * l.installmentsTotal), 0);
    const totalPaid = loans.reduce((s,l)=> s + (l.amount * l.installmentsPaid), 0);
    const percentPaid = totalOriginal > 0 ? (totalPaid / totalOriginal) * 100 : 0;

    let achieved = 0;
    for(let i=1;i<=10;i++){
      if(percentPaid >= i*10) achieved = i;
      else break;
    }
    loanMilestonesEl.innerHTML = Array.from({length:10}, (_,i)=>
      `<span class="milestone-dot ${i < achieved ? 'achieved' : ''}"></span>`
    ).join('');
    if(loans.length === 0){
      loanMilestoneLabelEl.textContent = 'add a loan to start tracking milestones';
    } else if(achieved >= 10){
      loanMilestoneLabelEl.textContent = 'milestone 10 of 10 — you are loan-free!';
    } else {
      loanMilestoneLabelEl.textContent = `milestone ${achieved} of 10 — ${percentPaid.toFixed(0)}% paid off`;
    }
    return percentPaid;
  }

  const SEVEN_DAYS_MS_LOAN = 7 * 24 * 60 * 60 * 1000;
  const FINISHED_THEME = { bg:'#DCEEDC', border:'#2F7A3D', text:'#1F5C29', hover:'rgba(47,122,61,0.12)' };

  function pruneFinishedLoans(){
    const now = Date.now();
    const before = loans.length;
    loans = loans.filter(l=>{
      const isDone = l.installmentsPaid >= l.installmentsTotal;
      if(isDone && l.finishedAt && (now - l.finishedAt) >= SEVEN_DAYS_MS_LOAN) return false;
      return true;
    });
    if(loans.length !== before) saveLoans();
  }

  function renderLoans(){
    pruneFinishedLoans();
    const totalRemaining = loans.reduce((sum, l)=> sum + (l.amount * Math.max(0, l.installmentsTotal - l.installmentsPaid)), 0);
    loanTotalEl.textContent = hideLoanTotal ? MASK_STRING : fmt(totalRemaining);
    loanCountEl.textContent = loans.length + (loans.length === 1 ? ' loan' : ' loans');
    const percentPaid = renderLoanMilestones();

    loanGrid.innerHTML = '';
    loans.forEach((loan, idx)=>{
      const isDone = loan.installmentsPaid >= loan.installmentsTotal;
      const theme = isDone ? FINISHED_THEME : themeFor(idx);
      const card = document.createElement('div');
      card.className = 'card' + (percentPaid >= 100 && loans.length > 0 ? ' milestone-gold' : '');
      card.style.background = theme.bg;
      card.style.borderLeftColor = theme.border;
      card.style.setProperty('--card-accent', theme.text);
      card.style.setProperty('--card-hover', theme.hover);
      const currentInstallment = Math.min(loan.installmentsPaid, loan.installmentsTotal);
      let daysLeftNote = '';
      if(isDone && loan.finishedAt){
        const daysLeft = Math.max(0, Math.ceil((SEVEN_DAYS_MS_LOAN - (Date.now() - loan.finishedAt)) / 86400000));
        daysLeftNote = `<p class="loan-finished-note">Loan is finished. This will auto-delete in ${daysLeft} day${daysLeft===1?'':'s'}.</p>`;
      }
      card.innerHTML = `
        <div class="card-top">
          <p class="loan-name">${escapeHtml(loan.name)}</p>
          <button class="eye-btn" data-loan-eye="${loan.id}" aria-label="toggle amount visibility">${loan.hidden ? EYE_OFF_SVG : EYE_OPEN_SVG}</button>
          <button class="del-btn" data-loan-del="${loan.id}" aria-label="delete loan">&times;</button>
        </div>
        <p class="acct-balance">${loan.hidden ? MASK_STRING : fmt(loan.amount)} <span style="font-size:12px;font-weight:400;color:var(--text-mute);">/month</span></p>
        <p class="loan-meta">${isDone ? 'loan fully paid' : `installment ${currentInstallment} of ${loan.installmentsTotal}`}</p>
        ${isDone ? daysLeftNote : `<p class="loan-countdown" data-due="${loan.dueDate}">${formatCountdown(loan.dueDate)}</p>`}
        <button class="pay-btn" data-pay="${loan.id}" ${isDone ? 'disabled' : ''}>${isDone ? 'loan completed' : 'mark as paid'}</button>
        <button class="history-link" data-loan-history="${loan.id}">View History</button>
      `;
      loanGrid.appendChild(card);
    });

    loanGrid.querySelectorAll('[data-pay]').forEach(b=>b.addEventListener('click', ()=>payLoan(b.getAttribute('data-pay'))));
    loanGrid.querySelectorAll('[data-loan-del]').forEach(b=>b.addEventListener('click', ()=>removeLoan(b.getAttribute('data-loan-del'))));
    loanGrid.querySelectorAll('[data-loan-eye]').forEach(b=>b.addEventListener('click', ()=>toggleLoanHidden(b.getAttribute('data-loan-eye'))));
    loanGrid.querySelectorAll('[data-loan-history]').forEach(b=>b.addEventListener('click', ()=>openHistory('loan', b.getAttribute('data-loan-history'))));
    updateCountdowns();
  }

  function payLoan(id){
    const loan = loans.find(l=>l.id===id);
    if(!loan || loan.installmentsPaid >= loan.installmentsTotal) return;
    const dueDateAtPayment = loan.dueDate;
    loan.installmentsPaid += 1;
    if(!Array.isArray(loan.history)) loan.history = [];
    loan.history.unshift({ ts: Date.now(), amount: loan.amount, installmentNumber: loan.installmentsPaid, dueDateAtPayment });
    if(loan.installmentsPaid < loan.installmentsTotal){
      const d = new Date(loan.dueDate + 'T00:00:00');
      d.setMonth(d.getMonth() + 1);
      loan.dueDate = d.toISOString().slice(0,10);
    } else {
      loan.finishedAt = Date.now();
    }
    saveLoans();
    renderLoans();
  }

  function removeLoan(id){
    if(!confirm('Are you sure you want to delete this entry?')) return;
    loans = loans.filter(l=>l.id!==id);
    saveLoans();
    renderLoans();
  }

  addLoanBtn.addEventListener('click', ()=>{
    loanForm.classList.toggle('open');
  });

  loanFormCancel.addEventListener('click', ()=>{
    loanForm.classList.remove('open');
    loanNameInput.value = '';
    loanAmountInput.value = '';
    loanDueDateInput.value = '';
    loanInstallmentsInput.value = '';
  });

  loanFormSave.addEventListener('click', ()=>{
    const name = loanNameInput.value.trim();
    const amount = parseFloat(loanAmountInput.value);
    const dueDate = loanDueDateInput.value;
    const installmentsTotal = parseInt(loanInstallmentsInput.value, 10);
    if(!name || isNaN(amount) || amount <= 0 || !dueDate || isNaN(installmentsTotal) || installmentsTotal <= 0){
      alert('Please fill in the loan name, amount, due date, and number of installments.');
      return;
    }
    loans.push({
      id: 'l' + Date.now(),
      name,
      amount,
      dueDate,
      installmentsTotal,
      installmentsPaid: 0,
      history: [],
      hidden: false
    });
    saveLoans();
    renderLoans();
    loanNameInput.value = '';
    loanAmountInput.value = '';
    loanDueDateInput.value = '';
    loanInstallmentsInput.value = '';
    loanForm.classList.remove('open');
  });

  function stampUpdated(){
    const now = new Date();
    lastUpdatedEl.textContent = 'last updated ' + now.toLocaleString('en-PH', {dateStyle:'medium', timeStyle:'short'});
  }

  function escapeHtml(s){
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  const SAVINGS_MILESTONES = [20000, 50000, 100000, 150000, 250000];

  function renderSavingsMilestones(total){
    let achieved = 0;
    for(let i=0;i<SAVINGS_MILESTONES.length;i++){
      if(total >= SAVINGS_MILESTONES[i]) achieved = i+1;
      else break;
    }
    savingsMilestonesEl.innerHTML = Array.from({length: SAVINGS_MILESTONES.length}, (_,i)=>
      `<span class="milestone-dot ${i < achieved ? 'achieved' : ''}"></span>`
    ).join('');
    if(achieved >= SAVINGS_MILESTONES.length){
      savingsMilestoneLabelEl.textContent = `Milestone ${SAVINGS_MILESTONES.length} of ${SAVINGS_MILESTONES.length} — You've Reached ${fmt(SAVINGS_MILESTONES[SAVINGS_MILESTONES.length-1])}!`;
    } else {
      const nextTarget = SAVINGS_MILESTONES[achieved];
      savingsMilestoneLabelEl.textContent = `Milestone ${achieved} of ${SAVINGS_MILESTONES.length} — Next Milestone at ${fmt(nextTarget)}`;
    }
    return achieved;
  }

  function render(){
    const total = accounts.reduce((s,a)=>s+Number(a.balance||0),0);
    totalEl.textContent = hideSavingsTotal ? MASK_STRING : fmt(total);
    countEl.textContent = accounts.length + (accounts.length===1 ? ' account' : ' accounts');
    renderSavingsMilestones(total);

    grid.innerHTML = '';
    accounts.forEach((acc, idx)=>{
      const hasGoal = acc.goal && acc.goal > 0;
      const progressPct = hasGoal ? Math.min(100, (acc.balance / acc.goal) * 100) : 0;
      const goalReached = hasGoal && acc.balance >= acc.goal;
      let dailyNeeded = null;
      let goalDateLabel = '';
      if(hasGoal && !goalReached && acc.goalTargetDate){
        const remaining = acc.goal - acc.balance;
        const targetTs = new Date(acc.goalTargetDate + 'T00:00:00').getTime();
        const daysLeft = Math.max(1, Math.ceil((targetTs - Date.now()) / 86400000));
        dailyNeeded = remaining / daysLeft;
        goalDateLabel = new Date(acc.goalTargetDate + 'T00:00:00').toLocaleDateString('en-US', {month:'long', day:'numeric', year:'numeric'}).replace(',', '');
      }
      const theme = goalReached ? FINISHED_THEME : themeFor(idx);
      const card = document.createElement('div');
      card.className = 'card' + (total >= SAVINGS_MILESTONES[SAVINGS_MILESTONES.length-1] ? ' milestone-gold' : '');
      card.style.background = theme.bg;
      card.style.borderLeftColor = theme.border;
      card.style.setProperty('--card-accent', theme.text);
      card.style.setProperty('--card-hover', theme.hover);
      card.innerHTML = `
        <div class="card-top">
          <div class="logo-wrap" data-logo="${acc.id}">${logoHtml(acc.name)}</div>
          <div class="name-field">
            <input class="acct-name" data-name="${acc.id}" value="${escapeHtml(acc.name)}" spellcheck="false">
            <input class="acct-number" data-number="${acc.id}" value="${escapeHtml(acc.accountNumber || '')}" placeholder="Account Number" spellcheck="false">
          </div>
          <button class="eye-btn" data-eye="${acc.id}" aria-label="toggle amount visibility">${acc.hidden ? EYE_OFF_SVG : EYE_OPEN_SVG}</button>
          <button class="del-btn" data-del="${acc.id}" aria-label="delete account">&times;</button>
        </div>
        <p class="acct-balance">${acc.hidden ? MASK_STRING : fmt(acc.balance)}</p>
        ${hasGoal ? `<p class="goal-progress-text">${progressPct.toFixed(0)}% of ${fmt(acc.goal)}</p>` : ''}
        ${dailyNeeded !== null ? `<p class="goal-progress-text">\u20B1${Math.round(dailyNeeded).toLocaleString('en-PH')} per day until ${goalDateLabel}</p>` : ''}
        ${goalReached ? `<p class="goal-reached-note">Target goal reached!</p>` : ''}
        <div class="controls" data-controls="${acc.id}">
          <button class="ctrl-btn minus" data-minus="${acc.id}">&minus;</button>
          <button class="ctrl-btn" data-plus="${acc.id}">+</button>
        </div>
        <div class="editor" data-editor="${acc.id}"></div>
        <button class="history-link" data-history="${acc.id}">View History</button>
        <button class="history-link" data-edit-goal="${acc.id}">Edit Goals</button>
        <button class="history-link calc-link">Calculator</button>
      `;
      grid.appendChild(card);
    });

    grid.querySelectorAll('[data-plus]').forEach(b=>b.addEventListener('click', ()=>openEdit(b.getAttribute('data-plus'), 1)));
    grid.querySelectorAll('[data-minus]').forEach(b=>b.addEventListener('click', ()=>openEdit(b.getAttribute('data-minus'), -1)));
    grid.querySelectorAll('[data-del]').forEach(b=>b.addEventListener('click', ()=>removeAccount(b.getAttribute('data-del'))));
    grid.querySelectorAll('[data-eye]').forEach(b=>b.addEventListener('click', ()=>toggleAccountHidden(b.getAttribute('data-eye'))));
    grid.querySelectorAll('[data-history]').forEach(b=>b.addEventListener('click', ()=>openHistory('account', b.getAttribute('data-history'))));
    grid.querySelectorAll('[data-name]').forEach(inp=>{
      inp.addEventListener('change', ()=>renameAccount(inp.getAttribute('data-name'), inp.value));
      inp.addEventListener('keydown', (e)=>{ if(e.key==='Enter'){ inp.blur(); } });
    });
    grid.querySelectorAll('[data-number]').forEach(inp=>{
      inp.addEventListener('change', ()=>updateAccountNumber(inp.getAttribute('data-number'), inp.value));
      inp.addEventListener('keydown', (e)=>{ if(e.key==='Enter'){ inp.blur(); } });
    });
    grid.querySelectorAll('[data-edit-goal]').forEach(b=>b.addEventListener('click', ()=>editGoal(b.getAttribute('data-edit-goal'))));
    grid.querySelectorAll('.calc-link').forEach(b=>b.addEventListener('click', openCalculator));
  }

  function updateHideSavingsTotalButton(){
    hideSavingsTotalIconEl.innerHTML = hideSavingsTotal ? EYE_OFF_SVG : EYE_OPEN_SVG;
    hideSavingsTotalTextEl.textContent = hideSavingsTotal ? 'Show Total Savings' : 'Hide Total Savings';
    hideSavingsTotalBtn.classList.toggle('active', hideSavingsTotal);
  }

  function updateHideLoanTotalButton(){
    hideLoanTotalIconEl.innerHTML = hideLoanTotal ? EYE_OFF_SVG : EYE_OPEN_SVG;
    hideLoanTotalTextEl.textContent = hideLoanTotal ? 'Show Total Loan' : 'Hide Total Loan';
    hideLoanTotalBtn.classList.toggle('active', hideLoanTotal);
  }

  function loadHideAllState(){
    try{ hideSavingsTotal = localStorage.getItem(HIDE_SAVINGS_TOTAL_KEY) === 'true'; }catch(e){ hideSavingsTotal = false; }
    try{ hideLoanTotal = localStorage.getItem(HIDE_LOAN_TOTAL_KEY) === 'true'; }catch(e){ hideLoanTotal = false; }
    updateHideSavingsTotalButton();
    updateHideLoanTotalButton();
  }

  hideSavingsTotalBtn.addEventListener('click', ()=>{
    hideSavingsTotal = !hideSavingsTotal;
    try{ localStorage.setItem(HIDE_SAVINGS_TOTAL_KEY, String(hideSavingsTotal)); }catch(e){}
    updateHideSavingsTotalButton();
    render();
  });

  hideLoanTotalBtn.addEventListener('click', ()=>{
    hideLoanTotal = !hideLoanTotal;
    try{ localStorage.setItem(HIDE_LOAN_TOTAL_KEY, String(hideLoanTotal)); }catch(e){}
    updateHideLoanTotalButton();
    renderLoans();
  });

  function toggleAccountHidden(id){
    const acc = accounts.find(a=>a.id===id);
    if(acc){
      acc.hidden = !acc.hidden;
      save();
      render();
    }
  }

  function toggleLoanHidden(id){
    const loan = loans.find(l=>l.id===id);
    if(loan){
      loan.hidden = !loan.hidden;
      saveLoans();
      renderLoans();
    }
  }

  function renameAccount(id, newName){
    const acc = accounts.find(a=>a.id===id);
    if(acc){
      const trimmed = newName.trim();
      acc.name = trimmed || acc.name;
      save();
      render();
    }
  }

  function updateAccountNumber(id, value){
    const acc = accounts.find(a=>a.id===id);
    if(acc){
      acc.accountNumber = value.trim();
      save();
    }
  }

  function editGoal(id){
    const acc = accounts.find(a=>a.id===id);
    if(!acc) return;
    currentGoalEditId = id;
    goalAmountInput.value = acc.goal || '';
    goalDateInput.value = acc.goalTargetDate || '';
    goalModal.classList.add('open');
  }

  function closeGoalModal(){
    goalModal.classList.remove('open');
    currentGoalEditId = null;
  }

  goalModalSave.addEventListener('click', ()=>{
    const acc = accounts.find(a=>a.id===currentGoalEditId);
    if(!acc){ closeGoalModal(); return; }
    const parsed = parseFloat(goalAmountInput.value);
    acc.goal = (!isNaN(parsed) && parsed > 0) ? parsed : 0;
    acc.goalTargetDate = goalDateInput.value || '';
    save();
    render();
    closeGoalModal();
  });

  goalModalCancel.addEventListener('click', closeGoalModal);
  goalModalClose.addEventListener('click', closeGoalModal);
  goalModal.addEventListener('click', (e)=>{
    if(e.target === goalModal) closeGoalModal();
  });

  let calcDisplay = '0';
  let calcFirstOperand = null;
  let calcOperator = null;
  let calcWaitingForSecond = false;

  function calcUpdateDisplay(){
    calcDisplayEl.textContent = calcDisplay;
  }

  function calcCompute(a, b, op){
    switch(op){
      case '+': return a + b;
      case '-': return a - b;
      case '*': return a * b;
      case '/': return b === 0 ? NaN : a / b;
      default: return b;
    }
  }

  function calcInputDigit(d){
    if(calcWaitingForSecond){
      calcDisplay = d;
      calcWaitingForSecond = false;
    } else {
      calcDisplay = calcDisplay === '0' ? d : calcDisplay + d;
    }
    calcUpdateDisplay();
  }

  function calcInputDecimal(){
    if(calcWaitingForSecond){
      calcDisplay = '0.';
      calcWaitingForSecond = false;
    } else if(!calcDisplay.includes('.')){
      calcDisplay += '.';
    }
    calcUpdateDisplay();
  }

  function calcHandleOperator(nextOp){
    const inputValue = parseFloat(calcDisplay);
    if(calcOperator && calcWaitingForSecond){
      calcOperator = nextOp;
      return;
    }
    if(calcFirstOperand === null){
      calcFirstOperand = inputValue;
    } else if(calcOperator){
      const result = calcCompute(calcFirstOperand, inputValue, calcOperator);
      calcDisplay = String(Math.round(result * 1e10) / 1e10);
      calcFirstOperand = result;
      calcUpdateDisplay();
    }
    calcWaitingForSecond = true;
    calcOperator = nextOp;
  }

  function calcEquals(){
    if(calcOperator === null || calcFirstOperand === null) return;
    const inputValue = parseFloat(calcDisplay);
    const result = calcCompute(calcFirstOperand, inputValue, calcOperator);
    calcDisplay = String(Math.round(result * 1e10) / 1e10);
    calcFirstOperand = null;
    calcOperator = null;
    calcWaitingForSecond = true;
    calcUpdateDisplay();
  }

  function calcPercent(){
    const value = parseFloat(calcDisplay);
    calcDisplay = String(value / 100);
    calcUpdateDisplay();
  }

  function calcClear(){
    calcDisplay = '0';
    calcFirstOperand = null;
    calcOperator = null;
    calcWaitingForSecond = false;
    calcUpdateDisplay();
  }

  function calcBackspace(){
    calcDisplay = calcDisplay.length > 1 ? calcDisplay.slice(0, -1) : '0';
    calcUpdateDisplay();
  }

  document.querySelectorAll('#calculator-modal [data-digit]').forEach(btn=>{
    btn.addEventListener('click', ()=>calcInputDigit(btn.getAttribute('data-digit')));
  });
  document.querySelectorAll('#calculator-modal [data-op]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const op = btn.getAttribute('data-op');
      if(op === '%'){ calcPercent(); } else { calcHandleOperator(op); }
    });
  });
  document.querySelector('#calculator-modal [data-action="clear"]').addEventListener('click', calcClear);
  document.querySelector('#calculator-modal [data-action="backspace"]').addEventListener('click', calcBackspace);
  document.querySelector('#calculator-modal [data-action="decimal"]').addEventListener('click', calcInputDecimal);
  document.querySelector('#calculator-modal [data-action="equals"]').addEventListener('click', calcEquals);

  function openCalculator(){
    calcClear();
    calculatorModal.classList.add('open');
  }

  function closeCalculator(){
    calculatorModal.classList.remove('open');
  }

  calculatorModalClose.addEventListener('click', closeCalculator);
  calculatorModal.addEventListener('click', (e)=>{
    if(e.target === calculatorModal) closeCalculator();
  });

  function openEdit(id, sign){
    if(openEditorId && openEditorId !== id){ closeEditor(openEditorId); }
    const editorDiv = grid.querySelector(`[data-editor="${id}"]`);
    const controlsDiv = grid.querySelector(`[data-controls="${id}"]`);
    if(!editorDiv) return;

    if(editorDiv.style.display === 'flex' && editorDiv.dataset.sign == sign){
      closeEditor(id);
      return;
    }

    editorDiv.dataset.sign = sign;
    editorDiv.style.display = 'flex';
    controlsDiv.style.display = 'none';
    editorDiv.innerHTML = `
      <input type="number" step="0.01" min="0" placeholder="${sign>0 ? 'amount to add' : 'amount to subtract'}" data-amount-input="${id}">
      <button data-confirm="${id}" aria-label="confirm">&check;</button>
      <button data-cancel="${id}" aria-label="cancel">&times;</button>
    `;
    openEditorId = id;
    const input = editorDiv.querySelector('[data-amount-input]');
    input.focus();
    input.addEventListener('keydown', (e)=>{
      if(e.key === 'Enter'){ confirmEdit(id); }
      if(e.key === 'Escape'){ closeEditor(id); }
    });
    editorDiv.querySelector('[data-confirm]').addEventListener('click', ()=>confirmEdit(id));
    editorDiv.querySelector('[data-cancel]').addEventListener('click', ()=>closeEditor(id));
  }

  function closeEditor(id){
    const editorDiv = grid.querySelector(`[data-editor="${id}"]`);
    const controlsDiv = grid.querySelector(`[data-controls="${id}"]`);
    if(editorDiv){ editorDiv.style.display = 'none'; editorDiv.innerHTML = ''; }
    if(controlsDiv){ controlsDiv.style.display = 'flex'; }
    openEditorId = null;
  }

  function confirmEdit(id){
    const editorDiv = grid.querySelector(`[data-editor="${id}"]`);
    const sign = Number(editorDiv.dataset.sign);
    const input = editorDiv.querySelector('[data-amount-input]');
    const val = parseFloat(input.value);
    if(!isNaN(val) && val > 0){
      const acc = accounts.find(a=>a.id===id);
      if(acc){
        acc.balance = Math.max(0, Number(acc.balance||0) + sign*val);
        if(!Array.isArray(acc.history)) acc.history = [];
        acc.history.unshift({ ts: Date.now(), delta: sign*val, balanceAfter: acc.balance });
        save();
      }
    }
    closeEditor(id);
    render();
  }

  function removeAccount(id){
    if(!confirm('Are you sure you want to delete this entry?')) return;
    accounts = accounts.filter(a=>a.id!==id);
    save();
    render();
  }

  function openHistory(type, id){
    currentHistoryType = type;
    currentHistoryId = id;
    currentHistoryDays = 'all';
    const item = type === 'loan' ? loans.find(l=>l.id===id) : accounts.find(a=>a.id===id);
    if(!item) return;
    historyModalTitle.textContent = item.name + ' history';
    updateFilterButtons();
    renderHistoryList();
    historyModal.classList.add('open');
  }

  function updateFilterButtons(){
    historyFilters.querySelectorAll('.filter-btn').forEach(btn=>{
      btn.classList.toggle('active', btn.getAttribute('data-days') === currentHistoryDays);
    });
  }

  function renderHistoryList(){
    const item = currentHistoryType === 'loan' ? loans.find(l=>l.id===currentHistoryId) : accounts.find(a=>a.id===currentHistoryId);
    if(!item) return;
    let entries = item.history || [];
    if(currentHistoryDays !== 'all'){
      const cutoff = Date.now() - Number(currentHistoryDays) * 24 * 60 * 60 * 1000;
      entries = entries.filter(e=>e.ts >= cutoff);
    }
    if(!entries.length){
      historyModalBody.innerHTML = `<p class="history-empty">No changes in this period.</p>`;
    } else if(currentHistoryType === 'loan'){
      historyModalBody.innerHTML = entries.map(e=>{
        const dateStr = new Date(e.ts).toLocaleString('en-PH', {dateStyle:'medium', timeStyle:'short'});
        return `
          <div class="history-row">
            <span class="history-date">${dateStr}</span>
            <span class="history-amounts">
              <div class="history-delta neg">-${fmt(e.amount)}</div>
              <div class="history-balance">installment ${e.installmentNumber} of ${item.installmentsTotal}</div>
            </span>
          </div>
        `;
      }).join('');
    } else {
      historyModalBody.innerHTML = entries.map(e=>{
        const isPos = e.delta > 0;
        const dateStr = new Date(e.ts).toLocaleString('en-PH', {dateStyle:'medium', timeStyle:'short'});
        return `
          <div class="history-row">
            <span class="history-date">${dateStr}</span>
            <span class="history-amounts">
              <div class="history-delta ${isPos ? 'pos' : 'neg'}">${isPos ? '+' : '-'}${fmt(Math.abs(e.delta))}</div>
              <div class="history-balance">balance: ${fmt(e.balanceAfter)}</div>
            </span>
          </div>
        `;
      }).join('');
    }
  }

  historyFilters.querySelectorAll('.filter-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      currentHistoryDays = btn.getAttribute('data-days');
      updateFilterButtons();
      renderHistoryList();
    });
  });

  function closeHistory(){
    historyModal.classList.remove('open');
    currentHistoryId = null;
  }

  historyModalClose.addEventListener('click', closeHistory);
  historyModal.addEventListener('click', (e)=>{
    if(e.target === historyModal) closeHistory();
  });
  document.addEventListener('keydown', (e)=>{
    if(e.key === 'Escape' && historyModal.classList.contains('open')) closeHistory();
    if(e.key === 'Escape' && goalModal.classList.contains('open')) closeGoalModal();
    if(e.key === 'Escape' && calculatorModal.classList.contains('open')) closeCalculator();
  });

  addBtn.addEventListener('click', ()=>{
    const name = prompt('Account name');
    if(name && name.trim()){
      accounts.push({id:'a'+Date.now(), name:name.trim(), balance:0, history:[], accountNumber:'', hidden:false, goal:0, goalTargetDate:''});
      save();
      render();
    }
  });

  loadHideAllState();
  load();
  loadLoans();
})();

if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}

</script>
</body>
</html>
